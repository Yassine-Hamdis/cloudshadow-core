# ??? Server ???????????????????????????????????????????????????????????????
server.address=0.0.0.0
server.port=8080

# ??? Database (Docker - uses container name) ??????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ??????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ??? JWT ??????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ??? Actuator ?????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ??? CloudShadow Custom Config ????????????????????????????????????????????
# Uses container name for Docker networking
#cloudshadow.backend.public-url=http://cloudshadow-backend:8080
# For K8s: set via CLOUDSHADOW_BACKEND_PUBLIC_URL env var
cloudshadow.backend.public-url=${CLOUDSHADOW_BACKEND_PUBLIC_URL:http://localhost:8080}

# AI Service URL (container name)
cloudshadow.ai.service.url=${AI_SERVICE_URL}

# Agent download URL
cloudshadow.agent.download-url=https://github.com/Yassine-Hamdis/cloudshadow-agent
